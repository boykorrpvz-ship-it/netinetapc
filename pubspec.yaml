name: ironvpn_mobile
description: Simple cross-platform netineta mobile client.
publish_to: "none"
version: 0.2.3+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.3.2
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/app_logo_mark.png
    - assets/bin/windows/sing-box.exe
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
